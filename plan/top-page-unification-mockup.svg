      <rect x="256" y="60" width="28" height="24" class="btn"/>
      <text x="270" y="76" text-anchor="middle" font-size="11">✅</text>
      <rect x="288" y="60" width="28" height="24" class="btn"/>
      <text x="302" y="76" text-anchor="middle" font-size="11">📅</text>
      <rect x="320" y="60" width="28" height="24" class="btn"/>
      <text x="334" y="76" text-anchor="middle" font-size="11">🧠</text>
      <rect x="352" y="60" width="28" height="24" class="btn"/>
      <text x="366" y="76" text-anchor="middle" font-size="11">📚</text>
      <rect x="384" y="60" width="28" height="24" class="btn"/>
      <text x="398" y="76" text-anchor="middle" font-size="11">📁</text>
      <rect x="416" y="60" width="28" height="24" class="btn"/>
      <text x="430" y="76" text-anchor="middle" font-size="11">⚙️</text>
