    <rect class="sidebar-bg" x="428" y="116" width="40" height="684"/>
    <text x="448" y="136" class="label-sub" text-anchor="middle">🔧</text>
    <text x="448" y="148" class="label-sub" text-anchor="middle">trace</text>

    <!-- annotations -->
    <text x="24" y="820" class="label-note">✓ Plugin launcher toolbar (#240 + #251 unified)</text>
    <text x="24" y="834" class="label-note">✓ Dashboard widgets pull from existing plugins (#143)</text>
    <text x="24" y="848" class="label-note">✓ Left sidebar = session history only (#133)</text>
    <text x="24" y="862" class="label-note">✓ Chat input in canvas, not sidebar (#133)</text>
  </g>

  <!-- ============ Panel C: PROPOSED (chat state) ============ -->
  <g transform="translate(1020, 80)">
