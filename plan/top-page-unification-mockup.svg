    <text x="176" y="138" class="label-bold">📊 Today (2026-04-15)</text>

    <rect x="176" y="152" width="120" height="78" class="dash-widget"/>
    <text x="184" y="172" class="label-bold" font-size="11">📰 Daily news</text>
    <text x="184" y="188" class="label-sub">• Fed rate decision</text>
    <text x="184" y="202" class="label-sub">• AI regulation update</text>
    <text x="184" y="216" class="label-sub">• OSS release: …</text>

    <rect x="304" y="152" width="108" height="78" class="dash-widget"/>
    <text x="312" y="172" class="label-bold" font-size="11">🔥 Priorities</text>
    <text x="312" y="188" class="label-sub">• Submit Q3 report</text>
    <text x="312" y="202" class="label-sub">• Ship PR #230</text>
    <text x="312" y="216" class="label-sub">• Review #231</text>

    <rect x="176" y="240" width="120" height="78" class="dash-widget"/>
    <text x="184" y="260" class="label-bold" font-size="11">✅ Today's todos</text>
    <text x="184" y="276" class="label-sub">☐ Client call 14:00</text>
    <text x="184" y="290" class="label-sub">☐ Review budget</text>
    <text x="184" y="304" class="label-sub">☑ Stand-up notes</text>

    <rect x="304" y="240" width="108" height="78" class="dash-widget"/>
    <text x="312" y="260" class="label-bold" font-size="11">📅 Schedule</text>
    <text x="312" y="276" class="label-sub">10:00 Planning</text>
    <text x="312" y="290" class="label-sub">14:00 Client</text>
    <text x="312" y="304" class="label-sub">16:00 Review</text>

    <rect x="176" y="328" width="236" height="78" class="dash-widget"/>
    <text x="184" y="348" class="label-bold" font-size="11">📝 Journal · daily/2026-04-15.md</text>
    <text x="184" y="364" class="label-sub">Yesterday you finished the wiki-backlinks</text>
    <text x="184" y="378" class="label-sub">feature and kicked off messaging plan review.</text>
    <text x="184" y="392" class="label-sub">Carry-over: address #211 fail-over.</text>

    <rect x="176" y="416" width="236" height="64" class="dash-widget"/>
    <text x="184" y="436" class="label-bold" font-size="11">🔗 Wiki recent</text>
    <text x="184" y="452" class="label-sub">• top-page-plan — 2m ago</text>
    <text x="184" y="466" class="label-sub">• messaging-layers — 1h ago</text>

