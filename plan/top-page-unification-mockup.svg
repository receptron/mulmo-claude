<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12">
  <style>
    .panel { fill: #ffffff; stroke: #cbd5e0; stroke-width: 1.5; }
    .bar   { fill: #f7fafc; stroke: #e2e8f0; }
    .sidebar-bg { fill: #fafafa; stroke: #e5e7eb; }
    .canvas-bg  { fill: #ffffff; stroke: #e5e7eb; }
    .dash-widget { fill: #f8fafc; stroke: #cbd5e0; rx: 6; }
    .btn { fill: #eef2ff; stroke: #c7d2fe; rx: 4; }
    .btn-active { fill: #4f46e5; stroke: #4338ca; rx: 4; }
    .msg-user { fill: #dbeafe; stroke: #93c5fd; rx: 6; }
    .msg-agent { fill: #f3f4f6; stroke: #d1d5db; rx: 6; }
    .input-box { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; rx: 6; }
    .input-bar { fill: #ffffff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
    .label-bold { font-weight: 600; fill: #1e293b; }
    .label     { fill: #334155; }
    .label-sub { fill: #64748b; font-size: 10px; }
    .label-note { fill: #2563eb; font-size: 10px; font-style: italic; }
    .badge-cur  { fill: #fef2f2; stroke: #fecaca; rx: 3; }
    .badge-prop { fill: #ecfdf5; stroke: #86efac; rx: 3; }
    .tag { fill: #e0e7ff; stroke: #a5b4fc; rx: 10; font-size: 10px; }
    .arrow { fill: none; stroke: #1d4ed8; stroke-width: 1.5; }
    .divider { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 3; }
  </style>

  <!-- Title -->
  <text x="760" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Top-page UX unification — current vs proposed</text>
  <text x="760" y="52" text-anchor="middle" font-size="13" fill="#475569">Issues #143 (dashboard) · #240 (direct nav) · #251 (skill launcher) · #133 (chat in canvas) · #239 (workspace.md)</text>

  <!-- ============ Panel A: CURRENT ============ -->
  <g transform="translate(20, 80)">
    <rect class="panel" x="0" y="0" width="480" height="820" rx="8"/>
    <rect class="badge-cur" x="12" y="12" width="72" height="22" />
    <text x="48" y="27" text-anchor="middle" font-weight="700" font-size="11" fill="#991b1b">CURRENT</text>
    <text x="100" y="27" class="label" font-size="12">App opens straight into chat — no landing page.</text>

    <!-- left sidebar -->
    <rect class="sidebar-bg" x="16" y="50" width="180" height="750"/>
    <text x="24" y="74" class="label-bold" font-size="13">MulmoClaude</text>
    <!-- icons row -->
    <circle cx="140" cy="70" r="9" fill="#e5e7eb" stroke="#9ca3af"/>
    <circle cx="162" cy="70" r="9" fill="#e5e7eb" stroke="#9ca3af"/>
    <circle cx="184" cy="70" r="9" fill="#e5e7eb" stroke="#9ca3af"/>

    <!-- Role picker -->
    <rect x="24" y="96" width="160" height="30" class="input-box"/>
    <text x="32" y="116" class="label">Role: ▼ General</text>

    <!-- History dropdown -->
    <rect x="24" y="138" width="160" height="28" class="btn"/>
    <text x="32" y="156" class="label">⏰ History</text>

    <!-- Tool result previews -->
    <text x="24" y="182" class="label-sub">— Tool result previews —</text>
    <rect x="24" y="190" width="160" height="40" class="dash-widget"/>
    <text x="32" y="207" class="label">📊 Spreadsheet Q3</text>
    <text x="32" y="221" class="label-sub">updated 2h ago</text>

    <rect x="24" y="238" width="160" height="40" class="dash-widget"/>
    <text x="32" y="255" class="label">📝 Wiki · Project</text>
    <text x="32" y="269" class="label-sub">updated yesterday</text>

    <rect x="24" y="286" width="160" height="40" class="dash-widget"/>
    <text x="32" y="303" class="label">✅ Todo list</text>
    <text x="32" y="317" class="label-sub">12 open items</text>

    <text x="24" y="346" class="label-sub">— Sample queries —</text>
    <rect x="24" y="354" width="160" height="20" class="btn"/>
    <text x="32" y="368" class="label-sub">What's on my calendar?</text>
    <rect x="24" y="378" width="160" height="20" class="btn"/>
    <text x="32" y="392" class="label-sub">Summarize yesterday</text>

    <!-- input at bottom of sidebar -->
    <rect x="24" y="740" width="160" height="50" class="input-bar"/>
    <text x="32" y="758" class="label">Type a message…</text>
    <text x="32" y="774" class="label-sub">[ send ]</text>

    <!-- canvas -->
    <rect class="canvas-bg" x="212" y="50" width="206" height="750"/>
    <text x="218" y="74" class="label-bold">Canvas (stack / files / single)</text>
    <rect x="222" y="90" width="186" height="130" class="msg-agent"/>
    <text x="230" y="108" class="label-sub">— tool result —</text>
    <text x="230" y="124" class="label">(empty when no session open)</text>
    <text x="230" y="210" class="label-sub">scroll ↕</text>

    <rect x="222" y="226" width="186" height="130" class="msg-agent"/>
    <text x="230" y="244" class="label-sub">— tool result —</text>

    <rect x="222" y="362" width="186" height="130" class="msg-agent"/>
    <text x="230" y="380" class="label-sub">— tool result —</text>

    <!-- right sidebar -->
    <rect class="sidebar-bg" x="428" y="50" width="40" height="750"/>
    <text x="448" y="68" class="label-sub" text-anchor="middle">tool</text>
    <text x="448" y="80" class="label-sub" text-anchor="middle">trace</text>

    <!-- Annotations -->
    <text x="24" y="820" class="label-note">• Input lives on the LEFT, but you read on the MIDDLE → attention split (#133)</text>
    <text x="24" y="834" class="label-note">• No direct path to "my todos / schedule" — must type or drill (#240)</text>
    <text x="24" y="848" class="label-note">• No landing page / dashboard (#143)</text>
    <text x="24" y="862" class="label-note">• Skill list only visible after asking Claude (#251)</text>
  </g>

  <!-- ============ Panel B: PROPOSED (dashboard) ============ -->
  <g transform="translate(520, 80)">
